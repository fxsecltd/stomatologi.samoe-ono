// Binary search
function binarySearch(arr,val){
  let l=0,r=arr.length-1;
  while(l<=r){
    const m=(l+r)>>1;
    if(arr[m]<val)l=m+1;else r=m-1;
  }
  return l;
}

// Convert degrees to microdegrees
function toMicrodegrees(lat,lon){
  return{
    y:Math.round(lat*MF),
    x:Math.round(lon*MF)
  };
}

// Convert microdegrees back to degrees
function toDegrees(y,x){
  return{
    lat:y/MF,
    lon:x/MF
  };
}

// Create OpenStreetMap link with marker
function createOSMWithMarker(lat,lon,title){
  const encodedTitle=encodeURIComponent(title||'Location');
  return 'https://www.openstreetmap.org/?mlat='+lat.toFixed(6)+'&mlon='+lon.toFixed(6)+
         '#map=16/'+lat.toFixed(6)+'/'+lon.toFixed(6)+'&layers=N';
}

// Create simple OpenStreetMap link
function createOpenStreetMapLink(lat,lon,zoom=16){
  return 'https://www.openstreetmap.org/#map='+zoom+'/'+lat.toFixed(6)+'/'+lon.toFixed(6);
}

// PROPER mailto URL creation (UNIVERSAL FIX for Gmail, Mail.ru, Outlook)
function createMailtoUrl(email,latMicro,lonMicro){
  const subject='Где поблизости '+SUBDOMAIN;
  const body=SUBDOMAIN+','+latMicro+','+lonMicro;
  
  // Step 1: Create RFC 2047 encoded subject (works in Outlook)
  const utf8Bytes=new TextEncoder().encode(subject);
  let binary='';
  for(let i=0;i<utf8Bytes.length;i++){
    binary+=String.fromCharCode(utf8Bytes[i]);
  }
  const base64=btoa(binary);
  const rfc2047Subject='=?UTF-8?B?'+base64+'?=';
  
  // Step 2: URL-encode the already encoded subject (works in Gmail/Mail.ru)
  const encodedSubject=encodeURIComponent(rfc2047Subject);
  
  // Step 3: Build the final mailto URL
  const url='mailto:'+encodeURIComponent(email)+
            '?subject='+encodedSubject+
            '&body='+encodeURIComponent(body);
  
  return url;
}

// RFC 2047 encoding for email subject (keeping for compatibility)
function encodeRFC2047(str){
  try{
    const utf8Bytes=new TextEncoder().encode(str);
    let binary='';
    for(let i=0;i<utf8Bytes.length;i++){
      binary+=String.fromCharCode(utf8Bytes[i]);
    }
    const base64=btoa(binary);
    return '=?UTF-8?B?'+base64+'?=';
  }catch(e){
    return encodeURIComponent(str);
  }
}

// Zone search
function findZone(x,y){
  const xi=binarySearch(XI,x);
  const xStart=Math.max(0,xi-20);
  const xEnd=Math.min(XI.length-1,xi+20);
  
  const yi=binarySearch(YI,y);
  const yStart=Math.max(0,yi-20);
  const yEnd=Math.min(YI.length-1,yi+20);
  
  for(let i=xStart;i<=xEnd;i++){
    const zoneId=XID[i];
    const zone=Z[zoneId];
    if(y>=zone[0]&&y<=zone[1]&&x>=zone[2]&&x<=zone[3]){
      return zone;
    }
  }
  
  for(let i=yStart;i<=yEnd;i++){
    const zoneId=YID[i];
    const zone=Z[zoneId];
    if(y>=zone[0]&&y<=zone[1]&&x>=zone[2]&&x<=zone[3]){
      return zone;
    }
  }
  
  return null;
}

// Start redirect to fallback
function redirectToFallback(lat,lon,latMicro,lonMicro){
  const messageEl=document.getElementById('message');
  
  if(FALLBACK&&FALLBACK.type==='mailto'){
    // Mailto fallback - redirect to mailto link
    messageEl.textContent='No service found. Opening email client...';
    const mailtoUrl=createMailtoUrl(FALLBACK.email,latMicro,lonMicro);
    
    setTimeout(()=>{
      try{
        window.location.href=mailtoUrl;
      }catch(e){
        console.error('Error opening mailto:',e);
        // Альтернативный способ для мобильных
        const a=document.createElement('a');
        a.href=mailtoUrl;
        a.style.display='none';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
      }
    },1500);
    
  }else if(FALLBACK&&FALLBACK.type==='url'){
    // URL fallback - redirect to website
    messageEl.textContent='No service found. Redirecting to website...';
    
    let seconds=3;
    const timer=document.getElementById('timer');
    timer.textContent='Redirecting in '+seconds+'...';
    timer.style.display='block';
    
    const interval=setInterval(()=>{
      seconds--;
      if(seconds>0){
        timer.textContent='Redirecting in '+seconds+'...';
      }else{
        clearInterval(interval);
        window.location.href=FALLBACK.url;
      }
    },1000);
    
  }else{
    // NO FALLBACK - Redirect to OpenStreetMap
    messageEl.textContent='No service found. Opening map...';
    
    const osmUrl=createOSMWithMarker(lat,lon,SUBDOMAIN+' Search');
    
    let seconds=3;
    const timer=document.getElementById('timer');
    timer.textContent='Opening OpenStreetMap in '+seconds+'...';
    timer.style.display='block';
    
    const interval=setInterval(()=>{
      seconds--;
      if(seconds>0){
        timer.textContent='Opening OpenStreetMap in '+seconds+'...';
      }else{
        clearInterval(interval);
        window.open(osmUrl,'_blank');
        // После открытия карты показываем сообщение
        messageEl.textContent='Map opened in new tab. You can close this page.';
        timer.style.display='none';
      }
    },1000);
  }
}

// Start redirect to service
function startRedirect(url,message){
  document.getElementById('message').textContent=message;
  const timer=document.getElementById('timer');
  
  let seconds=3;
  timer.textContent='Redirecting in '+seconds+'...';
  timer.style.display='block';
  
  const interval=setInterval(()=>{
    seconds--;
    if(seconds>0){
      timer.textContent='Redirecting in '+seconds+'...';
    }else{
      clearInterval(interval);
      window.location.href=url;
    }
  },1000);
}

// Handle errors
function handleError(message){
  const messageEl=document.getElementById('message');
  messageEl.textContent='Error: '+message;
  messageEl.style.color='#ef4444';
  
  if(FALLBACK&&FALLBACK.type==='url'){
    setTimeout(()=>{
      startRedirect(FALLBACK.url,'Redirecting to website...');
    },2000);
  }else if(!FALLBACK){
    // If no fallback and error, show message
    setTimeout(()=>{
      messageEl.textContent='Unable to determine location. Please enable location services.';
    },2000);
  }
}
